<div class="login-container">
  <h2>Connexion</h2>
  <form (ngSubmit)="onLogin()">
    <input type="text" [(ngModel)]="credentials.username" name="username" placeholder="Nom" required>
    <input type="password" [(ngModel)]="credentials.password" name="password" placeholder="Pass"  required autocomplete="current-password">
    <button type="submit">Se connecter</button>
  </form>

  @if (errorMessage) {
    <p style="color: red;">{{ errorMessage }}</p>
  }
</div>
