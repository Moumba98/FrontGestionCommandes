<div class="container">
  <h2 class="form-title">{{ modeEdition ? 'Modifier la commande' : 'Ajouter une commande' }}</h2>

  <form (ngSubmit)="enregistrer()">
    <div class="form-group">
      <label for="product">ID du Produit :</label>
      <input type="number" id="product" [(ngModel)]="commande.product.id" name="productId" required placeholder="Ex: 1">
    </div>

    <div class="form-group">
      <label for="quantite">Quantité :</label>
      <input type="number" id="quantite" [(ngModel)]="commande.quantite" name="quantite" min="1" required>
    </div>

    <div class="form-group">
      <label for="user">Attribuer à un utilisateur (client) :</label>
      <select id="user" [(ngModel)]="commande.user.id" name="clientId" required>
        <option [value]="0" disabled>-- Choisir un utilisateur --</option>
        @for (u of users; track u.id) {
          <option [value]="u.id">{{ u.username }}</option>
        }
      </select>
    </div>

    <div class="actions">
      <button type="submit" class="btn-save" [disabled]="commande.user.id === 0">
        {{ modeEdition ? 'Enregistrer les modifications' : 'Créer la commande' }}
      </button>
      <button type="button" (click)="router.navigate(['/commandes'])" class="btn-cancel">
        Annuler
      </button>
    </div>
  </form>
</div>
