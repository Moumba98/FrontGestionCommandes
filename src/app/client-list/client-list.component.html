<div class="container">
  <h2>Gestion des Utilisateurs</h2>

  @if (authService.isAdmin()) {
    <button [routerLink]="['/register']"> + Créer un utilisateur </button>
  }

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Utilisateur (Email)</th>
        <th>Rôle</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      @for (u of users; track u.id) {
        <tr>
          <td>{{ u.id }}</td>
          <td>{{ u.username }}</td> <td>
            <span [class]="u.role === 'ADMIN' ? 'text-danger fw-bold' : ''">
              {{ u.role }}
            </span>
          </td>
          <td>
            @if (authService.isAdmin()) {


             <button class="btn-delete" (click)="supprimer(u.id!)">Supprimer</button>
            }
          </td>
        </tr>
      } @empty {
        <tr>
          <td colspan="4" style="text-align: center;">Aucun utilisateur trouvé.</td>
        </tr>
      }
    </tbody>
  </table>
</div>
