<div class="container">
  <h2 class="form-title">Ajouter une commande</h2>

  <form (ngSubmit)="enregistrer()">
    <div class="form-group">
      <label for="produit">Produit :</label>
      <input type="text" id="produit" [(ngModel)]="commande.produit" name="produit" required placeholder="Nom de l'article">
    </div>

    <div class="form-group">
      <label for="quantite">Quantité :</label>
      <input type="number" id="quantite" [(ngModel)]="commande.quantite" name="quantite" min="1" required>
    </div>

    <div class="form-group">
      <label for="client">Attribuer à un client :</label>
      <select id="client" [(ngModel)]="commande.client.id" name="clientId" required>
        <option [value]="0" disabled>-- Choisir un client --</option>
        @for (c of clients; track c.id) {
          <option [value]="c.id">{{ c.nom }}</option>
        }
      </select>
    </div>

    <div class="actions">
      <button type="submit" class="btn-save" [disabled]="commande.client.id === 0">
        Créer la commande
      </button>
      <button type="button" (click)="router.navigate(['/commandes'])" class="btn-cancel">
        Annuler
      </button>
    </div>
  </form>
</div>
