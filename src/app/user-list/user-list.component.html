<div class="container">
  <h2>Gestion des Utilisateurs</h2>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Nom d'utilisateur</th>
        <th>Rôle</th>
        <th>Mot de passe</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      @for (user of listeUtilisateurs; track user.id) {
        <tr>
          <td>{{ user.id }}</td>
          <td><strong>{{ user.username }}</strong></td>
          <td>
            <span [class]="user.role === 'ADMIN' ? 'role-admin' : 'role-user'">
              {{ user.role }}
            </span>
          </td>
          <td class="password-stars">**********</td>
          <td>
            <div class="action-group">
              <button class="btn-edit" (click)="changerRole(user.username, 'ADMIN')">Mettre ADMIN</button>
              <button class="btn-orange" (click)="changerRole(user.username, 'USER')">Mettre USER</button>
              <button class="btn-delete" (click)="supprimerUtilisateur(user.id)">Supprimer</button>
            </div>
          </td>
        </tr>
      } @empty {
        <tr>
          <td colspan="5" style="text-align: center;">Aucun utilisateur trouvé.</td>
        </tr>
      }
    </tbody>
  </table>
</div>
